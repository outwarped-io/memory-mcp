name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint, type-check, unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install schemas (editable)
        run: |
          python -m pip install --upgrade pip
          pip install -e ./schemas

      - name: Install memory-mcp + dev/test extras
        run: |
          pip install -e ".[dev,test]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format check)
        run: ruff format --check .

      - name: mypy --strict
        run: mypy --strict src/memory_mcp

      - name: pytest (unit, no integration)
        run: pytest -m "not integration" -q
